name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    # Додаємо змінні оточення на рівні джоби
    env:
      UI_BASE_URL: https://the-internet.herokuapp.com
      API_BASE_URL: https://reqres.in

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm' # Кешування залежностей для пришвидшення наступних запусків

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright tests
      run: npx playwright test

    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }} # Звіт завантажиться навіть якщо тести впали
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
